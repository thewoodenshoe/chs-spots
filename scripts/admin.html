<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CHS Finds Admin</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 0; padding: 1rem 2rem; background: #0f172a; color: #e2e8f0; }
    h1 { font-size: 1.3rem; margin-bottom: 0.75rem; color: #0d9488; }
    h2 { font-size: 1rem; margin: 1.25rem 0 0.5rem; color: #94a3b8; border-bottom: 1px solid #334155; padding-bottom: 4px; }

    .search { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; margin-bottom: 0.75rem; }
    .search select, .search input { padding: 0.4rem 0.6rem; border-radius: 6px; border: 1px solid #475569; background: #1e293b; color: #e2e8f0; font-size: 0.85rem; }
    .search input { min-width: 200px; flex: 1; max-width: 400px; }
    .tab-bar { display: flex; gap: 2px; margin-bottom: 0.75rem; }
    .tab-btn { padding: 6px 14px; border: 1px solid #334155; background: #1e293b; color: #94a3b8; cursor: pointer; font-size: 0.8rem; font-weight: 600; border-radius: 6px 6px 0 0; }
    .tab-btn.active { background: #334155; color: #0d9488; border-bottom-color: #334155; }

    button { padding: 0.4rem 0.8rem; border-radius: 6px; border: 1px solid #0d9488; background: #0d9488; color: #fff; cursor: pointer; font-weight: 600; font-size: 0.8rem; }
    button:hover { background: #0f766e; }
    button.secondary { background: #1e293b; border-color: #475569; color: #94a3b8; }
    button.secondary:hover { background: #334155; }
    button.danger { background: #7f1d1d; border-color: #991b1b; }

    .message { margin: 0.5rem 0; padding: 0.5rem 0.75rem; border-radius: 6px; font-size: 0.85rem; display: none; }
    .message.error { background: #7f1d1d; color: #fecaca; display: block; }
    .message.success { background: #14532d; color: #bbf7d0; display: block; }

    .results { overflow-x: auto; max-height: 55vh; overflow-y: auto; border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
    th, td { padding: 4px 6px; text-align: left; border-bottom: 1px solid #1e293b; white-space: nowrap; max-width: 200px; overflow: hidden; text-overflow: ellipsis; }
    th { background: #334155; font-weight: 600; position: sticky; top: 0; z-index: 1; color: #94a3b8; }
    tr:hover { background: #1e293b; }
    tr.selected { background: #164e63; }

    .edit-panel { margin: 1rem 0; padding: 1rem 1.25rem; background: #1e293b; border: 1px solid #334155; border-radius: 8px; max-width: 900px; }
    .edit-panel h3 { margin: 0 0 0.75rem 0; font-size: 1rem; color: #0d9488; }
    .edit-section { margin-bottom: 1rem; }
    .edit-section-title { font-size: 0.8rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.4rem; }
    .field-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 6px 16px; }
    .edit-row { display: flex; gap: 0.5rem; align-items: flex-start; }
    .edit-row label { min-width: 140px; font-size: 0.8rem; color: #94a3b8; padding-top: 6px; flex-shrink: 0; }
    .edit-row input, .edit-row textarea, .edit-row select { flex: 1; min-width: 160px; padding: 5px 8px; border-radius: 4px; border: 1px solid #475569; background: #0f172a; color: #e2e8f0; font-size: 0.8rem; font-family: inherit; }
    .edit-row textarea { min-height: 50px; resize: vertical; }
    .edit-row input:read-only { opacity: 0.5; cursor: not-allowed; }
    .edit-actions { margin-top: 0.75rem; display: flex; gap: 0.5rem; align-items: center; }
    .auto-note { font-size: 0.72rem; color: #64748b; margin-left: 8px; }
    .badge { display: inline-block; font-size: 0.65rem; padding: 1px 6px; border-radius: 9999px; font-weight: 600; margin-left: 4px; }
    .badge-ok { background: #14532d; color: #86efac; }
    .badge-warn { background: #78350f; color: #fcd34d; }
    .count-badge { font-size: 0.75rem; color: #64748b; margin-left: 8px; }
    .empty { color: #64748b; font-style: italic; padding: 2rem; text-align: center; }
  </style>
</head>
<body>
  <h1>CHS Finds Admin</h1>

  <div class="tab-bar">
    <div class="tab-btn active" data-tab="spots">Spots</div>
    <div class="tab-btn" data-tab="venues">Venues</div>
  </div>

  <div class="search">
    <select id="field"></select>
    <input type="text" id="value" placeholder="Search value (use % for partial match)" />
    <button id="search">Search</button>
  </div>
  <div id="message" class="message"></div>
  <div class="results"><div id="table-wrap"></div></div>
  <div id="edit-container"></div>

<script>
const fieldEl = document.getElementById('field');
const valueEl = document.getElementById('value');
const searchBtn = document.getElementById('search');
const messageEl = document.getElementById('message');
const tableWrap = document.getElementById('table-wrap');
const editContainer = document.getElementById('edit-container');

let activeTab = 'spots';
let lastRows = [];

const SPOT_FIELDS = {
  search: ['id', 'title', 'type', 'area', 'venue_id', 'status', 'source', 'description', 'promotion_time', 'source_url', 'submitter_name', 'finding_approved'],
  display: ['id', 'venue_id', 'title', 'type', 'area', 'status', 'source', 'promotion_time', 'description', 'source_url', 'manual_override', 'finding_approved', 'finding_rationale', 'last_update_date', 'lat', 'lng', 'created_at', 'updated_at'],
  editGroups: {
    'Core': ['title', 'type', 'area', 'status', 'source'],
    'Promotion': ['promotion_time', 'promotion_list', 'description'],
    'Links & Media': ['source_url', 'photo_url'],
    'Location': ['lat', 'lng'],
    'Flags': ['manual_override', 'finding_approved', 'finding_rationale'],
    'Venue (read-only)': ['_venue_name', '_venue_address', '_venue_website', '_venue_phone'],
    'Meta': ['submitter_name', 'last_update_date', 'pending_edit', 'pending_delete'],
  },
};

const VENUE_FIELDS = {
  search: ['id', 'name', 'address', 'area', 'website', 'phone'],
  display: ['id', 'name', 'address', 'area', 'website', 'phone', 'lat', 'lng', 'operating_hours', 'hours_source', 'created_at', 'updated_at'],
  editGroups: {
    'Core': ['name', 'address', 'area', 'website', 'phone'],
    'Location': ['lat', 'lng'],
    'Hours': ['operating_hours', 'hours_source'],
  },
};

function getConfig() { return activeTab === 'venues' ? VENUE_FIELDS : SPOT_FIELDS; }

function showMessage(text, type) {
  messageEl.textContent = text;
  messageEl.className = 'message ' + (type || '');
}
function showError(err) { showMessage(typeof err === 'string' ? err : (err?.error || JSON.stringify(err)), 'error'); }
function showSuccess(msg) { showMessage(msg, 'success'); }

function populateFieldDropdown() {
  const cfg = getConfig();
  fieldEl.innerHTML = cfg.search.map(f => `<option value="${f}">${f}</option>`).join('');
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTab = btn.dataset.tab;
    populateFieldDropdown();
    tableWrap.innerHTML = '';
    editContainer.innerHTML = '';
    messageEl.className = 'message';
    lastRows = [];
  });
});

populateFieldDropdown();

function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

function renderTable(rows) {
  lastRows = rows;
  editContainer.innerHTML = '';
  if (!rows || rows.length === 0) {
    tableWrap.innerHTML = '<div class="empty">No results</div>';
    return;
  }
  const cols = getConfig().display;
  let html = '<table><thead><tr>';
  for (const c of cols) html += `<th>${c}</th>`;
  html += '<th></th></tr></thead><tbody>';
  for (const row of rows) {
    const rid = activeTab === 'venues' ? row.id : row.id;
    html += `<tr data-id="${esc(rid)}">`;
    for (const c of cols) {
      const v = row[c];
      const s = v == null ? '' : (typeof v === 'object' ? JSON.stringify(v) : String(v));
      const short = s.length > 50 ? s.slice(0, 47) + '...' : s;
      html += `<td title="${esc(s)}">${short || '<span style="color:#475569">-</span>'}</td>`;
    }
    html += `<td><button class="secondary edit-btn" data-id="${esc(rid)}">Edit</button></td></tr>`;
  }
  html += '</tbody></table>';
  tableWrap.innerHTML = html;
  tableWrap.querySelectorAll('.edit-btn').forEach(btn => {
    btn.addEventListener('click', (e) => { e.stopPropagation(); openEdit(btn.dataset.id); });
  });
}

function openEdit(id) {
  const row = lastRows.find(r => String(r.id) === String(id));
  if (!row) return;

  const cfg = getConfig();
  let html = `<div class="edit-panel"><h3>Edit ${activeTab === 'venues' ? 'venue' : 'spot'} #${esc(id)}</h3>`;

  for (const [section, fields] of Object.entries(cfg.editGroups)) {
    const isReadonly = section.includes('read-only');
    html += `<div class="edit-section"><div class="edit-section-title">${section}</div><div class="field-grid">`;
    for (const f of fields) {
      const val = row[f];
      const v = val == null ? '' : (typeof val === 'object' ? JSON.stringify(val) : String(val));
      const isTextarea = ['description', 'promotion_list', 'pending_edit', 'operating_hours', 'finding_rationale'].includes(f);
      const isToggle = ['manual_override', 'finding_approved', 'pending_delete'].includes(f);
      const ro = isReadonly ? ' readonly' : '';
      const label = f.replace(/^_venue_/, 'venue ');

      html += `<div class="edit-row"><label>${label}</label>`;
      if (isToggle && !isReadonly) {
        html += `<select data-field="${f}"><option value="0"${v !== '1' ? ' selected' : ''}>0 (No)</option><option value="1"${v === '1' ? ' selected' : ''}>1 (Yes)</option></select>`;
      } else if (isTextarea) {
        html += `<textarea data-field="${f}"${ro}>${esc(v)}</textarea>`;
      } else {
        html += `<input data-field="${f}" value="${esc(v)}"${ro} />`;
      }
      html += '</div>';
    }
    html += '</div></div>';
  }

  html += `<div class="edit-actions">
    <button id="save-edit">Save Changes</button>
    <button class="secondary" id="cancel-edit">Cancel</button>
    <span class="auto-note">last_update_date is set automatically on save</span>
  </div></div>`;

  editContainer.innerHTML = html;

  document.getElementById('save-edit').onclick = async () => {
    const payload = { id };
    if (activeTab === 'venues') payload._table = 'venues';

    for (const el of editContainer.querySelectorAll('[data-field]')) {
      if (el.readOnly) continue;
      const f = el.dataset.field;
      const v = el.tagName === 'SELECT' ? el.value : el.value;
      payload[f] = v || null;
    }

    if (activeTab === 'spots') {
      if (payload.lat != null) payload.lat = parseFloat(payload.lat) || null;
      if (payload.lng != null) payload.lng = parseFloat(payload.lng) || null;
      if (payload.manual_override !== undefined) payload.manual_override = payload.manual_override === '1' ? 1 : 0;
      if (payload.finding_approved !== undefined) payload.finding_approved = payload.finding_approved === '1' ? 1 : 0;
      if (payload.pending_delete !== undefined) payload.pending_delete = payload.pending_delete === '1' ? 1 : 0;
    } else {
      if (payload.lat != null) payload.lat = parseFloat(payload.lat) || null;
      if (payload.lng != null) payload.lng = parseFloat(payload.lng) || null;
    }

    try {
      const res = await fetch('/api/update', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      const data = await res.json();
      if (!res.ok) throw data;
      showSuccess(`Updated ${activeTab === 'venues' ? 'venue' : 'spot'} #${id}`);
      editContainer.innerHTML = '';
      const idx = lastRows.findIndex(r => String(r.id) === String(id));
      if (idx >= 0 && data.row) lastRows[idx] = { ...lastRows[idx], ...data.row };
      renderTable(lastRows);
    } catch (e) { showError(e); }
  };

  document.getElementById('cancel-edit').onclick = () => {
    editContainer.innerHTML = '';
    showMessage('', '');
  };
}

searchBtn.addEventListener('click', async () => {
  const field = fieldEl.value;
  const value = valueEl.value.trim();
  if (!value) { showError('Enter a search value'); return; }
  messageEl.className = 'message';
  try {
    const body = { field, value };
    if (activeTab === 'venues') body.table = 'venues';
    const res = await fetch('/api/query', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const data = await res.json();
    if (!res.ok) throw data;
    renderTable(data.rows || []);
    if (data.rows && data.rows.length > 0) showSuccess(`${data.rows.length} result(s)`);
    else showMessage('No results found', '');
  } catch (e) { showError(e); }
});

valueEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') searchBtn.click(); });
</script>
</body>
</html>
